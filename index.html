<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UPN Migration Hub | Kry/Livi</title>
<meta name="description" content="Pick your language to read about Kry/Livi's UPN migration." />
<meta name="robots" content="noindex,nofollow" />
<link rel="stylesheet" href="./assets/css/site.css" />
<script>
  // One-shot language picker: if a language was previously chosen, jump there.
  // EXCEPT when ?picker=1 is in the URL — that's the "Change language" entry point.
  // First-time visitors see the picker (now anchored to the top of the viewport
  // so it's immediately visible inside the SharePoint iframe).
  (function () {
    try {
      var params = new URLSearchParams(location.search);
      if (params.get('picker') === '1') return;
      var lang = localStorage.getItem('upn-hub-lang');
      if (lang === 'en' || lang === 'sv' || lang === 'no') {
        location.replace('./' + lang + '/');
      }
    } catch (e) { /* localStorage blocked — show picker */ }
  })();
</script>
<style>
  /* Local-only picker styling — separate from site.css to avoid coupling */
  body.picker {
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    background:
      radial-gradient(circle at 100% 0%, rgba(57, 207, 186, 0.18), transparent 55%),
      radial-gradient(circle at 0% 100%, rgba(3, 163, 244, 0.12), transparent 55%),
      var(--blue-100);
    padding: 32px 24px;
  }
  .picker-card {
    background: white;
    padding: 40px 36px 36px;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    max-width: 640px;
    width: 100%;
    text-align: center;
  }
  .picker-card .eyebrow {
    margin: 0 auto 18px;
  }
  .picker-card h1 {
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    margin: 0 0 8px;
  }
  .picker-card p.lead {
    color: var(--text-muted);
    margin: 0 0 28px;
  }
  .lang-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  @media (max-width: 540px) { .lang-grid { grid-template-columns: 1fr; } }
  .lang-grid a {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 22px 16px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    text-decoration: none;
    color: var(--blue-900);
    font-weight: 600;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
  }
  .lang-grid a:hover {
    background: white;
    border-color: var(--primary-500);
    transform: translateY(-2px);
    text-decoration: none;
  }
  .lang-grid .flag { font-size: 2rem; line-height: 1; }
  .lang-grid .label { font-size: 1rem; }
  .lang-grid .sub { font-size: 0.78rem; color: var(--text-muted); font-weight: 500; }
  .picker-foot {
    margin-top: 28px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 0.82rem;
  }
</style>
</head>
<body class="picker">

<main class="picker-card">
  <div class="eyebrow">Active project · ITA-1779</div>
  <h1>Your login is changing</h1>
  <p class="lead">Pick your language to read what's changing, when it happens, and what you need to do.</p>

  <div class="lang-grid" role="navigation" aria-label="Choose language">
    <a href="./en/" data-pick="en">
      <span class="flag" aria-hidden="true">🇬🇧</span>
      <span class="label">English</span>
      <span class="sub">For all markets</span>
    </a>
    <a href="./sv/" data-pick="sv">
      <span class="flag" aria-hidden="true">🇸🇪</span>
      <span class="label">Svenska</span>
      <span class="sub">För Sverige</span>
    </a>
    <a href="./no/" data-pick="no">
      <span class="flag" aria-hidden="true">🇳🇴</span>
      <span class="label">Norsk</span>
      <span class="sub">For Norge</span>
    </a>
  </div>

  <div class="picker-foot">
    UPN Migration · Kry / Livi · IT · Your choice is remembered for this browser.
  </div>
</main>

<script>
  // Persist language choice so subsequent visits skip the picker.
  document.querySelectorAll('.lang-grid a').forEach(function (link) {
    link.addEventListener('click', function () {
      try {
        localStorage.setItem('upn-hub-lang', link.getAttribute('data-pick'));
      } catch (e) { /* swallow — link still navigates */ }
    });
  });
</script>

</body>
</html>
